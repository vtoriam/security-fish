<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KeyNest — Verify MFA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:#f5f5f3;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
  .card{background:#fff;border:0.5px solid #e0ddd4;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:380px}
  .logo{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:2px}
  .logo span{color:#534AB7}
  .sub{font-size:13px;color:#888780;margin-bottom:2rem}
  .icon{width:52px;height:52px;border-radius:14px;background:#EEEDFE;border:0.5px solid #AFA9EC;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:1.25rem}
  h2{font-size:17px;font-weight:500;margin-bottom:6px}
  p{font-size:13px;color:#5F5E5A;line-height:1.6;margin-bottom:1.5rem}
  label{font-size:12px;font-weight:500;color:#5F5E5A;display:block;margin-bottom:5px}
  input{width:100%;padding:10px 12px;border:0.5px solid #d3d1c7;border-radius:8px;font-size:24px;font-family:monospace;letter-spacing:.2em;text-align:center;color:#2c2c2a;background:#fafaf8;margin-bottom:1rem;outline:none}
  input:focus{border-color:#534AB7;box-shadow:0 0 0 3px #EEEDFE}
  button{width:100%;padding:10px;background:#534AB7;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer}
  button:hover{background:#3C3489}
  .alert{font-size:13px;padding:9px 12px;border-radius:8px;margin-bottom:1rem;background:#fcebeb;color:#a32d2d;border:0.5px solid #f7c1c1}
  .links{display:flex;flex-direction:column;gap:6px;margin-top:1rem;text-align:center}
  a.lnk{font-size:13px;color:#888780;text-decoration:none}
  a.lnk:hover{color:#2c2c2a}
  .timer{font-size:12px;color:#888780;text-align:center;margin-top:.5rem}
  #countdown{font-weight:500;color:#534AB7}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Key<span>Nest</span></div>
  <div class="sub">Two-factor authentication</div>
  {% for cat, msg in get_flashed_messages(with_categories=True) %}
  <div class="alert">{{ msg }}</div>
  {% endfor %}
  <div class="icon">🔐</div>
  <h2>Enter your code</h2>
  <p>Open your authenticator app and enter the 6-digit code for <strong>KeyNest ({{ display_name }})</strong>.</p>
  <form method="POST">
    <label>Verification code</label>
    <input type="text" name="code" placeholder="000000" maxlength="6"
           inputmode="numeric" pattern="[0-9]{6}" required
           autocomplete="one-time-code" autofocus>
    <button type="submit">Verify and sign in</button>
  </form>
  <div class="timer">Code refreshes in <span id="countdown">30</span>s</div>
  <div class="links">
    <a href="/mfa/setup" class="lnk">Set up authenticator app</a>
    <a href="/logout" class="lnk">Back to login</a>
  </div>
</div>
<script>
  function tick(){ document.getElementById('countdown').textContent = 30-(Math.floor(Date.now()/1000)%30); }
  tick(); setInterval(tick,1000);
</script>
</body>
</html>
