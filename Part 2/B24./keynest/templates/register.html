<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KeyNest — Create account</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:#f5f5f3;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
  .card{background:#fff;border:0.5px solid #e0ddd4;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:400px}
  .logo{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:2px}
  .logo span{color:#534AB7}
  .sub{font-size:13px;color:#888780;margin-bottom:2rem}
  label{font-size:12px;font-weight:500;color:#5F5E5A;display:block;margin-bottom:5px}
  input,select{width:100%;padding:9px 12px;border:0.5px solid #d3d1c7;border-radius:8px;font-size:14px;font-family:inherit;color:#2c2c2a;background:#fafaf8;margin-bottom:1rem;outline:none}
  input:focus,select:focus{border-color:#534AB7;box-shadow:0 0 0 3px #EEEDFE}
  .btn{width:100%;padding:10px;background:#534AB7;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer}
  .btn:hover{background:#3C3489}
  .alert{font-size:13px;padding:9px 12px;border-radius:8px;margin-bottom:1rem}
  .alert-error{background:#fcebeb;color:#a32d2d;border:0.5px solid #f7c1c1}
  .alert-success{background:#e1f5ee;color:#085041;border:0.5px solid #9fe1cb}
  .foot{text-align:center;margin-top:1.25rem;font-size:13px;color:#888780}
  .foot a{color:#534AB7;text-decoration:none}
  #admin-code-wrap{display:none}
  .role-note{font-size:11px;color:#888780;margin-top:-10px;margin-bottom:1rem;line-height:1.5}
  .strength-bar{height:4px;border-radius:2px;margin-top:-10px;margin-bottom:1rem;transition:width .3s,background .3s;width:0}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Key<span>Nest</span></div>
  <div class="sub">Create your account</div>
  {% for cat, msg in get_flashed_messages(with_categories=True) %}
  <div class="alert alert-{{ cat }}">{{ msg }}</div>
  {% endfor %}
  <form method="POST" id="regForm">
    <label>Display name</label>
    <input type="text" name="display_name" placeholder="e.g. Jamie" required>
    <label>Username</label>
    <input type="text" name="username" placeholder="e.g. jamie" required autocomplete="username">
    <label>Password</label>
    <input type="password" name="password" id="pw" placeholder="At least 8 characters" required autocomplete="new-password" oninput="checkStrength(this.value)">
    <div class="strength-bar" id="strengthBar"></div>
    <label>Confirm password</label>
    <input type="password" name="confirm" placeholder="Repeat password" required autocomplete="new-password">
    <label>Role</label>
    <select name="role" id="roleSelect" onchange="toggleAdminCode(this.value)">
      <option value="child">Child</option>
      <option value="parent">Parent</option>
      <option value="admin">Admin</option>
    </select>
    <p class="role-note" id="roleNote">Children can only view and manage their own passwords.</p>
    <div id="admin-code-wrap">
      <label>Admin invite code</label>
      <input type="text" name="admin_code" placeholder="Enter admin invite code">
    </div>
    <button class="btn" type="submit">Create account</button>
  </form>
  <div class="foot">Already have an account? <a href="/login">Sign in</a></div>
</div>
<script>
const notes = {
  child:'Children can only view and manage their own passwords.',
  parent:'Parents can view all passwords and manage family entries.',
  admin:'Admins have full access including user management. Requires an invite code.'
};
function toggleAdminCode(v){
  document.getElementById('admin-code-wrap').style.display = v==='admin'?'block':'none';
  document.getElementById('roleNote').textContent = notes[v]||'';
}
function checkStrength(pw){
  const bar = document.getElementById('strengthBar');
  let score = 0;
  if(pw.length>=8) score++;
  if(pw.length>=12) score++;
  if(/[A-Z]/.test(pw)&&/[a-z]/.test(pw)) score++;
  if(/[0-9]/.test(pw)) score++;
  if(/[^A-Za-z0-9]/.test(pw)) score++;
  const pct = Math.round((score/5)*100);
  const col = pct<40?'#D85A30':pct<70?'#BA7517':'#1D9E75';
  bar.style.width=pct+'%'; bar.style.background=col;
}
</script>
</body>
</html>
